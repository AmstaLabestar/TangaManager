version: '3.8'

services:
  web:
    build: .
    env_file:
      - .env.prod
    environment:
      COLLECTSTATIC: "1"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env.prod
    environment:
      RUN_MIGRATIONS: "0"
    volumes:
      - media:/app/media
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tanga_manager}
      POSTGRES_USER: ${POSTGRES_USER:-tanga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tanga}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      - media:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media:
  staticfiles:
